name: Docker Build + Clang-tidy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: check-list-bot:ci
          outputs: type=docker,dest=/tmp/check-list-bot-ci.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-image-check-list-bot-ci
          path: /tmp/check-list-bot-ci.tar
          if-no-files-found: error

  docker-clang-tidy:
    name: Run clang-tidy in Docker
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v6

      - name: Download Docker image artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-image-check-list-bot-ci
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/check-list-bot-ci.tar

      - name: Run clang-tidy inside Docker
        run: docker run --rm check-list-bot:ci ./scripts/check_tidy.sh --build-dir build
