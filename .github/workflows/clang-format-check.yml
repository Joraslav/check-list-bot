name: Clang-format check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  checks: write
  contents: read
  pull-requests: write
  issues: read
  security-events: write

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run clang-format style check
        id: clang_format
        uses: jidicula/clang-format-action@v4.16.0
        with:
          clang-format-version: "18"
          check-path: "src"
          include-regex: "main.cpp"

      - name: Publish formatting report
        if: always()
        run: |
          echo "## Clang-format report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow: ${{ github.workflow }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Job: ${{ github.job }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ref: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- clang-format version: 18" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: **${{ steps.clang_format.outcome }}**" >> "$GITHUB_STEP_SUMMARY"