name: Build

on:
  push:
    branches: ["main"]

permissions:
  checks: write
  contents: read
  pull-requests: write
  issues: read
  security-events: write

env:
  TARGET: check-list-bot

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration:
          - Release
          - Debug

    steps:
      - uses: actions/checkout@v6

      - name: Install Conan
        run: pip install conan

      - name: Conan install requarements
        run: conan install . --build=missing -pr:h profiles/${{matrix.configuration}} -pr:b profiles/${{matrix.configuration}}

      - name: Configure CMake
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.configuration}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.configuration}}

      - name: Archive Artifacts
        run: tar -czvf artifacts-${{matrix.configuration}}.tar.gz build/${{env.TARGET}}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-${{matrix.configuration}}
          path: artifacts-${{matrix.configuration}}.tar.gz